<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>Rigo Email Signature</title>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Wix Madefor Display', Arial, Helvetica, sans-serif; background:#ffffff; margin:0; padding:30px; text-align:left; }
  .edit { color:#8A2ECC; font-weight:bold; }
</style>
</head>
<body>

  <!-- ============ COPY EVERYTHING BELOW ============ -->

  <!-- Simple left-aligned table, no background card, no fixed float. Flows inline like a normal signature. -->
  <table cellpadding="0" cellspacing="0" border="0" style="font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif; color:#1a1a1a; max-width:600px; border-collapse:collapse;">
    <tr>
      <td style="padding:0 0 2px; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
        <span style="font-size:26px; font-weight:bold; color:#1a1a1a; letter-spacing:-0.5px;" class="edit">Kayode Odeyinde</span>
      </td>
    </tr>
    <tr>
      <td style="padding:0 0 14px; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
        <span style="font-size:15px; color:#555555;" class="edit">Chief Executive Officer</span>
      </td>
    </tr>

    <!-- Contact row -->
    <tr>
      <td style="padding:0 0 6px;">
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
          <tr>
            <td style="padding:0 18px 0 0; font-size:13px; color:#333333; white-space:nowrap; vertical-align:middle; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
              <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-phone.png" width="15" height="15" alt="Phone" style="vertical-align:middle; border:0;">&nbsp;<span style="color:#333333;" class="edit">+234 (0) 801 234 5678</span>
            </td>
            <td style="padding:0 18px 0 0; font-size:13px; color:#333333; white-space:nowrap; vertical-align:middle; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
              <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-email.png" width="15" height="15" alt="Email" style="vertical-align:middle; border:0;">&nbsp;<a href="mailto:kayode@rigohq.com" style="color:#333333; text-decoration:none;" class="edit">kayode@rigohq.com</a>
            </td>
            <td style="padding:0; font-size:13px; color:#333333; white-space:nowrap; vertical-align:middle; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
              <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-web.png" width="15" height="15" alt="Website" style="vertical-align:middle; border:0;">&nbsp;<a href="https://www.rigohq.com" style="color:#333333; text-decoration:none;">www.rigohq.com</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- Lagos address -->
    <tr>
      <td style="padding:0 0 4px; font-size:13px; color:#555555; vertical-align:middle; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
        <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-location.png" width="15" height="15" alt="Location" style="vertical-align:middle; border:0;">&nbsp;3rd Floor, Office Apartments, 13 Rasheed Alaba Williams Street, Lekki Phase 1, Lagos.
      </td>
    </tr>
    <!-- Abuja address -->
    <tr>
      <td style="padding:0 0 16px; font-size:13px; color:#555555; vertical-align:middle; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
        <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-location.png" width="15" height="15" alt="Location" style="vertical-align:middle; border:0;">&nbsp;4th Floor, Churchgate Plaza, Constitution Avenue, Abuja.
      </td>
    </tr>

    <!-- Banner -->
    <tr>
      <td style="padding:0 0 14px;">
        <a href="https://www.rigohq.com" style="text-decoration:none;">
          <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/rigo-banner.png"
               alt="Rigo — Powering Healthcare in Africa through Finance and Technology solutions"
               width="600" style="display:block; width:100%; max-width:600px; height:auto; border-radius:16px; border:0;">
        </a>
      </td>
    </tr>

    <!-- Footer: tagline + social -->
    <tr>
      <td>
        <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
          <tr>
            <td style="font-size:13px; color:#555555; vertical-align:middle; font-family:'Wix Madefor Display',Arial,Helvetica,sans-serif;">
              Finance for growth. Technology for scale.
            </td>
            <td align="right" style="vertical-align:middle; white-space:nowrap; text-align:right;">

              <a href="https://www.instagram.com/therigohq/" style="text-decoration:none;">
                <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-instagram.png" width="18" height="18" alt="Instagram" style="display:inline-block; margin-left:12px; vertical-align:middle; border:0;">
              </a>
              <a href="https://www.facebook.com/rigoincorporated" style="text-decoration:none;">
                <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-facebook.png" width="18" height="18" alt="Facebook" style="display:inline-block; margin-left:12px; vertical-align:middle; border:0;">
              </a>
              <a href="https://x.com/therigohq" style="text-decoration:none;">
                <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-x.png" width="16" height="16" alt="X" style="display:inline-block; margin-left:12px; vertical-align:middle; border:0;">
              </a>
              <a href="https://www.tiktok.com/@therigohq" style="text-decoration:none;">
                <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-tiktok.png" width="16" height="16" alt="TikTok" style="display:inline-block; margin-left:12px; vertical-align:middle; border:0;">
              </a>
              <a href="https://www.linkedin.com/company/rigoinc/" style="text-decoration:none;">
                <img src="https://raw.githubusercontent.com/saintdaniel009-cell/Rigo-email-assets/63f0c3f0662f18b743c112fca7c25c32b4f2d2c3/icon-linkedin.png" width="18" height="18" alt="LinkedIn" style="display:inline-block; margin-left:12px; vertical-align:middle; border:0;">
              </a>

            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

  <!-- ============ END COPY AREA ============ -->

</body>
</html>
